<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
          
            background-color: #000000;
            background-image: url('fon1.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ff0000;
            font-family: 'Nosifier', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.6) 70%, rgba(0,0,0,0.9) 100%);
            z-index: -1;
            pointer-events: none;
        }

        @keyframes flicker {
            0%, 100% { text-shadow: 0 0 5px rgba(255,0,0,0.5), 0 0 10px rgba(255,0,0,0.3); }
            50% { text-shadow: 0 0 10px rgba(255,0,0,0.8), 0 0 20px rgba(255,0,0,0.6); }
        }

        h1 {
            font-family: 'Rowdies', cursive;
            font-size: 45px;
            margin-bottom: 5px;
            text-transform: uppercase;
            animation: flicker 1.5s infinite alternate;
        }

        .subtitle {
            font-family: 'Metal Mania', cursive;
            font-size: 20px;
            margin-bottom: 30px;
            font-style: italic;
            animation: flicker 2s infinite alternate;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            width: 45%;
            aspect-ratio: 1 / 1;
            border: 2px solid #ffffff;
            background: rgba(255,255,255,0.1);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            box-shadow: 0 0 5px rgba(255,255,255,0.2);
        }

        .card:hover {
            border-color: #ff0000;
                        box-shadow: 0 0 15px rgba(255,0,0,0.8);
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #modal-box {
            background: #000;
            border: 2px solid #ff0000;
            padding: 30px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
        }

        #modal-box p {
            margin-top: 0;
            font-size: 16px;
            font-family: 'Nosifier', sans-serif;
            color: #ff0000;
        }

        #modal-input {
            background: #111;
            border: 1px solid #ff0000;
            color: #fff;
            padding: 10px;
            width: 90%;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
            font-family: sans-serif; /* Для удобства ввода цифр */
            font-size: 18px;
        }

        .modal-buttons {
            display: flex;
            justify-content: space-around;
        }

        .btn {
            color: #ff0000;
            background: none;
            border: 1px solid #ff0000;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            font-family: 'Nosifier', sans-serif;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #ff0000;
            color: #000;
        }
    </style>
</head>
<body>

    <h1>Memories</h1>
    <div class="subtitle">the black rose</div>

    <div class="grid">
        <div class="card" onclick="openModal('The black rose', 'story1.html')">
            <img src="s1.jpg" alt="Memory 1">
        </div>
        <div class="card" onclick="openModal('Existence', 'story2.html')">
            <img src="s2.jpg" alt="Memory 2">
        </div>
        <div class="card" onclick="openModal('Flowers', 'story3.html')">
            <img src="s3.jpg" alt="Memory 3">
        </div>
        <div class="card" onclick="openModal('4444', 'story4.html')">
            <img src="un.jpg" alt="Memory 4">
        </div>
        <div class="card" onclick="openModal('5555', 'story5.html')">
            <img src="un.jpg" alt="Memory 5">
        </div>
        <div class="card" onclick="openModal('6666', 'story6.html')">
            <img src="un.jpg" alt="Memory 6">
        </div>
    </div>

    <div id="modal-overlay">
        <div id="modal-box">
            <p>Введите код.</p>
            <!-- Поле ввода с поддержкой нажатия Enter -->
            <input type="text" id="modal-input" placeholder="..." onkeydown="if(event.key==='Enter') submitCode()">
            <div class="modal-buttons">
                <button class="btn" onclick="closeModal()">Отмена</button>
                <button class="btn" onclick="submitCode()">ОК</button>
            </div>
        </div>
    </div>

    <script>
        var currentTargetUrl = "";
        var currentCorrectCode = "";

        function openModal(code, url) {
            currentCorrectCode = code;
            currentTargetUrl = url; // ИСПРАВЛЕНО: Теперь переменная совпадает с объявленной выше
            document.getElementById('modal-input').value = "";
            document.getElementById('modal-overlay').style.display = "flex";
            
            // Небольшая задержка для фокуса на мобильных устройствах
            setTimeout(function() {document.getElementById('modal-input').focus();
            }, 100);
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = "none";
        }

        function submitCode() {
            var val = document.getElementById('modal-input').value;
            if (val === currentCorrectCode) {
                window.location.href = currentTargetUrl;
            } else {
                alert("Неверно.");
                closeModal();
            }
        }
    </script>

</body>
</html>
